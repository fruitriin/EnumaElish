# Template test
template primitive
  |,>>
    allow cat, echo, head, tail, wc

template safeRead
  next: primitive

template bulkExec
  extends: safeRead
  |,>>
    allow grep, sort, uniq, awk, sed
    deny rm  "don't pipe into destructive commands"
  exec:
    deny rm  "expand to tempfile first"
    allow cp, mv, touch

allow ls
  next: primitive

allow find
  next: bulkExec

allow xargs
  next: bulkExec

allow grep
  next: bulkExec
  |,>>
    allow wc
