# Strict ruleset — deny by default, allow only known-safe commands

settings:
  max_context_depth: 2
  max_rules_per_cmd: 5
  fallback: deny

template primitive
  |,>>
    allow cat, echo, head, tail, wc, sort, uniq

template safeRead
  next: primitive
  |,>>
    allow grep, awk, sed

template bulkExec
  extends: safeRead
  |,>>
    deny rm    "don't pipe into destructive commands"
  exec:
    deny rm    "expand to tempfile first"
    allow cp, mv, touch

preToolUse

allow ls
  next: primitive

allow cat
  next: primitive
allow echo
allow pwd
allow diff
allow which
allow mkdir

allow find
  next: bulkExec
  args:
    -delete: deny  "find -delete is destructive"

allow grep
  next: safeRead

allow git
  args:
    ^(status|log|diff|show|branch|tag|stash|ls-files)\b: allow
    ^push\b: deny  "git push is blocked in strict mode"
    ^(filter-branch|filter-repo)\b: deny  "arbitrary code execution risk"

deny rm  "rm is blocked in strict mode"
deny eval  "eval is blocked"
deny curl  "curl is blocked in strict mode"
