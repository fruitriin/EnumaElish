# Permissive ruleset — allow most commands, deny only clearly dangerous patterns

settings:
  max_context_depth: 2
  max_rules_per_cmd: 5
  fallback: allow

template bulkExec
  |,>>
    deny rm    "don't pipe into destructive commands"
  exec:
    deny rm    "expand to tempfile first"

preToolUse

allow find
  next: bulkExec
  args:
    -delete: ask  "find -delete requires confirmation"

allow xargs
  next: bulkExec

allow curl
  |
    deny bash   "curl | bash is not allowed"
    deny sh     "curl | sh is not allowed"

allow rm

deny eval  "eval is not statically analyzable"
